<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prenotazione confermata</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root {
  --red: #c0392b;
  --red-dark: #96281b;
  --gold: #c9a84c;
  --dark: #0e0b08;
  --dark2: #1a1410;
  --text: #f0ebe0;
  --text-muted: #a09070;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background: var(--dark);
  color: var(--text);
  font-family: 'Lato', sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  padding:20px;
  overflow:hidden;
}

/* effetto noise come homepage */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:0.4;
  pointer-events:none;
}

/* CARD */
.container{
  background: rgba(26,20,16,0.9);
  backdrop-filter: blur(20px);
  border:1px solid rgba(201,168,76,0.2);
  padding:50px 40px;
  border-radius:8px;
  text-align:center;
  max-width:520px;
  animation:fadeUp 0.8s ease;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

/* ICONA */
.check{
  font-size:3rem;
  margin-bottom:20px;
  color:var(--gold);
  animation:pop 0.6s ease;
}

/* TITOLI */
h1{
  font-family:'Playfair Display', serif;
  font-size:2.5rem;
  color:var(--cream);
  margin-bottom:15px;
}

p{
  color:var(--text-muted);
  font-size:1.05rem;
  line-height:1.6;
  margin-bottom:30px;
}

/* BOTTONE */
.btn{
  display:inline-block;
  padding:14px 32px;
  background:var(--red);
  color:#fff;
  text-decoration:none;
  font-size:0.85rem;
  letter-spacing:0.1em;
  text-transform:uppercase;
  font-weight:700;
  border-radius:4px;
  transition:all 0.25s;
}

.btn:hover{
  background:var(--red-dark);
  transform:translateY(-2px);
  box-shadow:0 8px 25px rgba(192,57,43,0.35);
}

/* ANIMAZIONI */
@keyframes fadeUp{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes pop{
  from{transform:scale(0.5); opacity:0;}
  to{transform:scale(1); opacity:1;}
}

</style>
</head>

<body>

<div class="container">
  <div class="check">✔</div>
  <h1>Prenotazione ricevuta</h1>
  <p>
    Grazie per aver scelto la nostra pizzeria.<br>
    Ti aspettiamo per farti vivere un’esperienza autentica 🍕
  </p>

  <a href="index.html" class="btn">Torna alla Home</a>
</div>

</body>
</html>
