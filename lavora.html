<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lavora con noi - Pizzeria Renato</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root {
  --red:#c0392b;
  --red-dark:#96281b;
  --gold:#c9a84c;
  --dark:#0e0b08;
  --dark2:#1a1410;
  --dark3:#241e18;
  --text:#f0ebe0;
  --text-muted:#a09070;
  --border:rgba(201,168,76,0.2);
}

*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'Lato';}

/* ===== NAVBAR IDENTICA ===== */
nav{
  position:fixed;top:0;width:100%;z-index:1000;
  padding:0 40px;
  display:flex;justify-content:space-between;align-items:center;height:70px;
  background:rgba(14,11,8,0.82);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}

nav .logo{display:flex;align-items:center;gap:12px;}
nav .logo img{height:40px;border-radius:50%;border:2px solid var(--gold);}
nav .logo-text{font-family:'Playfair Display';color:var(--gold);}

nav ul{display:flex;gap:5px;list-style:none;}
nav a{
  color:var(--text-muted);
  text-decoration:none;
  padding:8px 16px;
  font-size:0.88rem;
  text-transform:uppercase;
}
nav a.active{color:var(--gold);}

/* ===== HAMBURGER IDENTICO ===== */
.hamburger{
  display:none;
  flex-direction:column;
  gap:6px;
  cursor:pointer;
}
.hamburger span{
  width:24px;height:2px;background:var(--text);
}
.hamburger.active span:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
.hamburger.active span:nth-child(2){opacity:0;}
.hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}

/* ===== OVERLAY ===== */
.menu-overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,0.55);
  z-index:998;
}
.menu-overlay.show{display:block;}

/* ===== MOBILE MENU IDENTICO ===== */
@media(max-width:768px){
  nav ul{
    position:fixed;
    top:0;right:-100%;
    height:100vh;width:72%;
    background:var(--dark2);
    flex-direction:column;
    padding:80px 0;
    transition:right 0.35s;
    z-index:999;
  }
  nav ul.show{right:0;}
  .hamburger{display:flex;}
}

/* ===== FORM ===== */
.container{
  max-width:500px;
  margin:140px auto;
  background:var(--dark2);
  padding:40px;
  border:1px solid var(--border);
}

.container h1{
  text-align:center;
  font-family:'Playfair Display';
  margin-bottom:30px;
}

input,select{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  background:#111;
  border:1px solid #333;
  color:white;
}

button{
  width:100%;
  padding:14px;
  background:var(--red);
  color:white;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="menu-overlay" id="menuOverlay"></div>

<nav>
  <div class="logo">
    <img src="https://raw.githubusercontent.com/davideiacuzio005-source/NUOVAPIZZA/main/Logo%20Pizzeria.jpg">
    <span class="logo-text">Pizzeria Renato</span>
  </div>

  <ul id="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="menu.html">Menù</a></li>
    <li><a href="index.html#reservation">Prenotazione</a></li>
    <li><a href="lavora.html" class="active">Lavora con noi</a></li>
    <li><a href="index.html#about">Chi siamo</a></li>
  </ul>

  <button class="hamburger" id="hamburger">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- CONTENUTO -->
<div class="container">
<h1>Lavora con noi</h1>

<form>
<input type="text" placeholder="Nome e Cognome" required>
<input type="number" placeholder="Anno di nascita" required>

<select required>
<option>Tipo di lavoro</option>
<option>Cameriere</option>
<option>Cuoco</option>
<option>Pizzaiolo</option>
</select>

<select required>
<option>Orari</option>
<option>Mattina</option>
<option>Sera</option>
</select>

<button>Invia candidatura</button>
</form>
</div>

<script>
// ===== SCRIPT IDENTICO =====
const hamburger   = document.getElementById('hamburger');
const navLinks    = document.getElementById('nav-links');
const menuOverlay = document.getElementById('menuOverlay');

function openMenu(){
  hamburger.classList.add('active');
  navLinks.classList.add('show');
  menuOverlay.classList.add('show');
  document.body.style.overflow='hidden';
}
function closeMenu(){
  hamburger.classList.remove('active');
  navLinks.classList.remove('show');
  menuOverlay.classList.remove('show');
  document.body.style.overflow='';
}

hamburger.addEventListener('click',()=>{
  navLinks.classList.contains('show') ? closeMenu() : openMenu();
});
menuOverlay.addEventListener('click', closeMenu);
document.querySelectorAll('#nav-links a').forEach(a=>{
  a.addEventListener('click', closeMenu);
});
</script>

</body>
</html>
