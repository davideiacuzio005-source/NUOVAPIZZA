<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin - Pizzeria Renato</title>

<style>
body{
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
  padding:20px;
}

input, button{
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
}

button{
  background:#ff4d4d;
  color:white;
  cursor:pointer;
}

.card{
  background:#1a1a1a;
  margin:10px;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>Area Admin</h1>

<!-- LOGIN -->
<div id="login">
  <input type="password" id="password" placeholder="Inserisci password">
  <button onclick="login()">Login</button>
</div>

<!-- PANNELLO -->
<div id="adminPanel" style="display:none;">

  <h2>Aggiungi Pizza</h2>

  <input id="nome" placeholder="Nome pizza"><br>
  <input id="ingredienti" placeholder="Ingredienti"><br>
  <input id="prezzo" placeholder="Prezzo"><br>

  <p>Carica immagine:</p>
  <input type="file" id="file"><br>

  <p>Tipo:</p>
  <label><input type="checkbox" value="normale"> Classica</label>
  <label><input type="checkbox" value="piccante"> Piccante</label>
  <label><input type="checkbox" value="vegetariana"> Vegetariana</label>

  <br><br>
  <button onclick="aggiungiPizza()">➕ Aggiungi</button>

  <h2>Lista Pizze</h2>
  <div id="lista"></div>

</div>

<script>
const PASSWORD = "1234"; // CAMBIA QUI

function login(){
  const input = document.getElementById("password").value;

  if(input === PASSWORD){
    document.getElementById("login").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    mostraLista();
  } else {
    alert("Password sbagliata");
  }
}

// DATI
let pizze = JSON.parse(localStorage.getItem("pizze")) || [];

// AGGIUNGI PIZZA CON IMMAGINE
function aggiungiPizza(){

  let fileInput = document.getElementById("file");
  let file = fileInput.files[0];

  if(!file){
    alert("Seleziona un'immagine!");
    return;
  }

  let reader = new FileReader();

  reader.onload = function(e){

    let tipi = [];
    document.querySelectorAll("input[type=checkbox]:checked")
      .forEach(c => tipi.push(c.value));

    let pizza = {
      nome: document.getElementById("nome").value,
      ingredienti: document.getElementById("ingredienti").value,
      prezzo: document.getElementById("prezzo").value,
      immagine: e.target.result,
      tipo: tipi
    };

    pizze.push(pizza);

    salva();
    mostraLista();

    alert("Pizza aggiunta!");

    // reset campi
    document.getElementById("nome").value="";
    document.getElementById("ingredienti").value="";
    document.getElementById("prezzo").value="";
    document.getElementById("file").value="";
    document.querySelectorAll("input[type=checkbox]").forEach(c=>c.checked=false);
  };

  reader.readAsDataURL(file);
}

// SALVA
function salva(){
  localStorage.setItem("pizze", JSON.stringify(pizze));
}

// MOSTRA LISTA
function mostraLista(){
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  pizze.forEach((p, index)=>{
    lista.innerHTML += `
      <div class="card">
        <h3>${p.nome}</h3>
        <p>${p.ingredienti}</p>
        <p>€${p.prezzo}</p>
        <img src="${p.immagine}" style="width:100px;border-radius:10px;"><br><br>
        <button onclick="elimina(${index})">❌ Elimina</button>
      </div>
    `;
  });
}

// ELIMINA
function elimina(index){
  pizze.splice(index,1);
  salva();
  mostraLista();
}
</script>

</body>
</html>
