<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu - Pizzeria Renato</title>

<style>
body{background:#111;color:white;font-family:'Roboto',sans-serif;}
nav{padding:15px;text-align:center;}
.menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px;padding:30px;}
.card{background:#1a1a1a;border-radius:15px;padding:15px;position:relative;}
.card img{width:100%;height:200px;object-fit:cover;border-radius:10px;}
.badge{position:absolute;top:10px;left:10px;padding:5px 10px;border-radius:20px;font-size:0.8rem;font-weight:bold;}
.normale{background:#6c757d;}
.piccante{background:#e60000;}
.vegetariana{background:#28a745;}
</style>
</head>
<body>

<nav><h1>Menu Pizzeria Renato</h1></nav>
<div class="menu" id="menu"></div>

<script>
// 📌 URL per leggere il JSON raw da GitHub
const url = "https://raw.githubusercontent.com/davideiacuzio005/NUOVAPIZZA/main/pizze.json";

fetch(url)
  .then(res => res.json())
  .then(pizze => {
    const menu = document.getElementById("menu");
    menu.innerHTML = "";
    pizze.forEach(p => {
      let badge = p.tipo.map(t=>`<span class="badge ${t}">${t}</span>`).join("");
      let card = document.createElement("div");
      card.classList.add("card");
      card.innerHTML = `
        ${badge}
        <img src="${p.immagine}">
        <h3>${p.nome}</h3>
        <p>${p.ingredienti}</p>
        <p>€${p.prezzo}</p>
      `;
      menu.appendChild(card);
    });
  })
  .catch(err => {
    document.getElementById("menu").innerHTML =
      "<p style='color:red;text-align:center;'>Errore nel caricare il menu.</p>";
  });
</script>

</body>
</html>
