<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menu - Pizzeria Renato</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root{
  --red:#c0392b;
  --gold:#c9a84c;
  --dark:#0e0b08;
  --dark2:#1a1410;
  --dark3:#241e18;
  --text:#f0ebe0;
  --text-muted:#a09070;
  --border:rgba(201,168,76,0.2);
}

*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'Lato',sans-serif;}

/* NAV */
nav{
position:fixed;top:0;width:100%;
display:flex;justify-content:space-between;align-items:center;
padding:0 30px;height:70px;
background:rgba(14,11,8,0.9);
backdrop-filter:blur(20px);
border-bottom:1px solid var(--border);
z-index:1000;
}
nav a{
color:var(--text-muted);
text-decoration:none;
margin:0 10px;
font-size:0.8rem;
letter-spacing:0.1em;
text-transform:uppercase;
}
nav a:hover{color:var(--gold);}

/* HERO */
.hero{
height:40vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:#000;
}
.hero h1{
font-family:'Playfair Display',serif;
font-size:2.5rem;
}

/* FILTRI */
.filters{
margin-top:90px;
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
padding:20px;
}
.filters button{
background:transparent;
border:1px solid var(--border);
padding:8px 18px;
color:var(--text-muted);
border-radius:20px;
cursor:pointer;
transition:0.2s;
font-size:0.7rem;
text-transform:uppercase;
}
.filters button.active,
.filters button:hover{
background:var(--red);
color:#fff;
border-color:var(--red);
}

/* MENU */
.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
padding:30px;
}

/* CARD */
.card{
background:var(--dark3);
border:1px solid var(--border);
border-radius:6px;
padding:20px;
transition:0.3s;
}
.card:hover{
border-color:var(--gold);
transform:translateY(-5px);
}

/* TESTO */
h3{
font-family:'Playfair Display',serif;
margin-bottom:8px;
}
.desc{
color:var(--text-muted);
font-size:0.9rem;
margin-bottom:10px;
}
.allergeni{
font-size:0.8rem;
color:#888;
margin-bottom:10px;
}
.price{
color:var(--gold);
font-weight:bold;
}

/* BADGE */
.badge{
display:inline-block;
padding:3px 8px;
border-radius:12px;
font-size:0.7rem;
margin-right:5px;
margin-bottom:8px;
}
.normale{background:#555;}
.piccante{background:#c0392b;}
.vegetariana{background:#2e7d32;}

footer{
text-align:center;
padding:20px;
color:var(--text-muted);
font-size:0.8rem;
}
</style>
</head>

<body>

<nav>
  <div>Pizzeria Renato</div>
  <div>
    <a href="index.html">Home</a>
    <a href="menu.html">Menu</a>
  </div>
</nav>

<section class="hero">
  <h1>Le Nostre Pizze</h1>
</section>

<div class="filters">
  <button class="active" data-type="all">Tutto</button>
  <button data-type="normale">Classiche</button>
  <button data-type="piccante">Piccanti</button>
  <button data-type="vegetariana">Vegetariane</button>
</div>

<section class="menu" id="menu"></section>

<footer>
  © 2026 Pizzeria Renato
</footer>

<script>

/* ===============================
   🍕 QUI INSERISCI LE PIZZE
   Per aggiungerne una nuova copia questo blocco:
   
   {
     nome: "Nome Pizza",
     ingredienti: "Ingredienti...",
     allergeni: "Allergeni...",
     prezzo: "10.00",
     tipo: ["normale","piccante"] // puoi metterne più di uno
   }
================================ */

let pizze = [

  {
    nome: "Diavola",
    ingredienti: "Pomodoro, mozzarella, salame piccante",
    allergeni: "Glutine, latte",
    prezzo: "9.50",
    tipo: ["normale","piccante"]
  },

  {
    nome: "Ortolana",
    ingredienti: "Mozzarella, zucchine, melanzane, peperoni",
    allergeni: "Glutine, latte",
    prezzo: "8.50",
    tipo: ["vegetariana"]
  }

];

const menu = document.getElementById("menu");

function mostraMenu(){
  menu.innerHTML = "";

  pizze.forEach(pizza => {

    let badge = pizza.tipo.map(t =>
      `<span class="badge ${t}">${t}</span>`
    ).join("");

    let div = document.createElement("div");
    div.classList.add("card");
    div.dataset.type = pizza.tipo.join(" ");

    div.innerHTML = `
      ${badge}
      <h3>${pizza.nome}</h3>
      <p class="desc">${pizza.ingredienti}</p>
      <p class="allergeni">Allergeni: ${pizza.allergeni}</p>
      <p class="price">€${pizza.prezzo}</p>
    `;

    menu.appendChild(div);
  });
}

mostraMenu();

/* FILTRI */
const buttons = document.querySelectorAll('.filters button');

buttons.forEach(btn=>{
  btn.addEventListener('click',()=>{

    buttons.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');

    const type = btn.dataset.type;
    const cards = document.querySelectorAll('.card');

    cards.forEach(card=>{
      if(type==='all' || card.dataset.type.includes(type)){
        card.style.display="block";
      } else {
        card.style.display="none";
      }
    });
  });
});

</script>

</body>
</html>
