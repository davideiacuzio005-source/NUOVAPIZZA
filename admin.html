<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

<style>
body{background:#111;color:white;font-family:Arial;text-align:center;}
input,button{margin:5px;padding:10px;border-radius:10px;border:none;}
button{background:red;color:white;}
.card{background:#1a1a1a;margin:10px;padding:10px;border-radius:10px;}
</style>
</head>

<body>

<h1>Admin</h1>

<input id="nome" placeholder="Nome"><br>
<input id="ingredienti" placeholder="Ingredienti"><br>
<input id="prezzo" placeholder="Prezzo"><br>
<input type="file" id="file"><br>

<button onclick="aggiungi()">Aggiungi</button>

<div id="lista"></div>

<script>
// 🔥 INCOLLA QUI LA CONFIG
const firebaseConfig = {
  apiKey: "QUI",
  authDomain: "QUI",
  projectId: "QUI"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// CONVERTI IMMAGINE
function toBase64(file){
  return new Promise((res,rej)=>{
    let reader = new FileReader();
    reader.onload = ()=>res(reader.result);
    reader.onerror = err=>rej(err);
    reader.readAsDataURL(file);
  });
}

// AGGIUNGI
async function aggiungi(){

  let file = document.getElementById("file").files[0];
  if(!file) return alert("Seleziona immagine");

  let img = await toBase64(file);

  await db.collection("pizze").add({
    nome: document.getElementById("nome").value,
    ingredienti: document.getElementById("ingredienti").value,
    prezzo: document.getElementById("prezzo").value,
    immagine: img
  });

  alert("Aggiunta!");
}

// MOSTRA
db.collection("pizze").onSnapshot(snapshot=>{
  let lista = document.getElementById("lista");
  lista.innerHTML="";

  snapshot.forEach(doc=>{
    let p = doc.data();

    lista.innerHTML += `
      <div class="card">
        <h3>${p.nome}</h3>
        <img src="${p.immagine}" width="100">
        <button onclick="elimina('${doc.id}')">Elimina</button>
      </div>
    `;
  });
});

// ELIMINA
function elimina(id){
  db.collection("pizze").doc(id).delete();
}
</script>

</body>
</html>
