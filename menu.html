<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menu - Pizzeria Renato</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Roboto',sans-serif;}
body{background:#111;color:white;}

nav{
position:fixed;top:0;width:100%;
display:flex;justify-content:space-between;align-items:center;
padding:15px 20px;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);
z-index:1000;
}
nav a{color:white;text-decoration:none;margin:0 10px;}
nav a:hover{color:#ff4d4d;}

.hero{
height:50vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:url('https://images.unsplash.com/photo-1513104890138-7c749659a591') center/cover;
position:relative;
}
.hero::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}
.hero h1{
position:relative;
z-index:2;
font-size:3rem;
}

.filters{
margin-top:80px;
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
padding:20px;
}
.filters button{
background:#222;
border:none;
padding:10px 20px;
color:white;
border-radius:20px;
cursor:pointer;
transition:0.3s;
}
.filters button.active,
.filters button:hover{
background:#ff4d4d;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:30px;
}

.card{
background:#1a1a1a;
border-radius:15px;
overflow:hidden;
transition:0.3s;
position:relative;
border:2px solid #333;
}
.card:hover{
transform:translateY(-10px) scale(1.03);
border-color:#ff4d4d;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.info{
padding:15px;
text-align:center;
}
.info h3{margin-bottom:5px;}
.price{color:#ff4d4d;font-weight:bold;}

.badge{
position:absolute;
top:10px;
left:10px;
padding:5px 10px;
border-radius:20px;
font-size:0.8rem;
font-weight:bold;
}
.normale{background:#6c757d;}
.piccante{background:#e60000;}
.vegetariana{background:#28a745;}

footer{
text-align:center;
padding:30px;
opacity:0.7;
}
</style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="menu.html">Menu</a>
</nav>

<section class="hero">
  <h1>Le Nostre Pizze</h1>
</section>

<div class="filters">
  <button class="active" data-type="all">Tutto</button>
  <button data-type="normale">Classiche</button>
  <button data-type="piccante">Piccanti</button>
  <button data-type="vegetariana">Vegetariane</button>
</div>

<section class="menu" id="menu"></section>

<footer>
  © 2026 Pizzeria Renato
</footer>

<script>
let pizze = JSON.parse(localStorage.getItem("pizze")) || [];

const menu = document.getElementById("menu");

function mostraMenu(){
  menu.innerHTML = "";

  pizze.forEach(pizza => {

    let badge = pizza.tipo.map(t =>
      `<span class="badge ${t}">${t}</span>`
    ).join("");

    let div = document.createElement("div");
    div.classList.add("card");
    div.dataset.type = pizza.tipo.join(" ");

    div.innerHTML = `
      ${badge}
      <img src="${pizza.immagine}">
      <div class="info">
        <h3>${pizza.nome}</h3>
        <p>${pizza.ingredienti}</p>
        <p class="price">€${pizza.prezzo}</p>
      </div>
    `;

    menu.appendChild(div);
  });
}

mostraMenu();

const buttons = document.querySelectorAll('.filters button');

buttons.forEach(btn=>{
  btn.addEventListener('click',()=>{

    buttons.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');

    const type = btn.dataset.type;
    const cards = document.querySelectorAll('.card');

    cards.forEach(card=>{
      if(type==='all' || card.dataset.type.includes(type)){
        card.style.display="block";
      } else {
        card.style.display="none";
      }
    });
  });
});
</script>

</body>
</html>
