<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu - Pizzeria Renato</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

<style>
body{background:#111;color:white;font-family:Arial;}
.menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px;}
.card{background:#1a1a1a;border-radius:10px;padding:10px;}
img{width:100%;height:200px;object-fit:cover;}
</style>
</head>

<body>

<h1 style="text-align:center;">Menu</h1>

<section class="menu" id="menu"></section>

<script>
// 🔥 INCOLLA QUI LA TUA CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "QUI",
  authDomain: "QUI",
  projectId: "QUI"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// CARICA PIZZE LIVE
db.collection("pizze").onSnapshot(snapshot => {
  const menu = document.getElementById("menu");
  menu.innerHTML = "";

  snapshot.forEach(doc => {
    let p = doc.data();

    menu.innerHTML += `
      <div class="card">
        <img src="${p.immagine}">
        <h3>${p.nome}</h3>
        <p>${p.ingredienti}</p>
        <p>€${p.prezzo}</p>
      </div>
    `;
  });
});
</script>

</body>
</html>
