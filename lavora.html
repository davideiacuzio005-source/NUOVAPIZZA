<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lavora con noi</title>

  <style>
    body {
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: #1a1a1a;
      padding: 2rem;
      border-radius: 10px;
      width: 100%;
      max-width: 450px;
    }

    h1 {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    input, select {
      padding: 0.7rem;
      border-radius: 5px;
      border: 1px solid #333;
      background: #111;
      color: #fff;
    }

    input[type="file"] {
      background: #111;
    }

    button {
      padding: 0.8rem;
      border: none;
      background: #ff4d4d;
      color: #fff;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #e60000;
    }

    .back {
      text-align: center;
      margin-top: 1rem;
    }

    .back a {
      color: #ff4d4d;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Lavora con noi 🍕</h1>

    <form action="https://formsubmit.co/davideiacuzio005@gmail.com" method="POST" enctype="multipart/form-data">

      <!-- disabilita captcha -->
      <input type="hidden" name="_captcha" value="false">

      <!-- oggetto email -->
      <input type="hidden" name="_subject" value="Nuova candidatura dal sito!">

      <input type="text" name="Nome" placeholder="Nome e Cognome" required>

      <input type="number" name="Anno di nascita" placeholder="Anno di nascita" min="1950" max="2010" required>

      <select name="Lavoro" required>
        <option value="">Tipo di lavoro</option>
        <option>Cameriere</option>
        <option>Cuoco</option>
        <option>Pizzaiolo</option>
      </select>

      <select name="Orari" required>
        <option value="">Orari preferiti</option>
        <option>Mattina</option>
        <option>Sera</option>
        <option>Mattina e Sera</option>
      </select>

      <select name="Giorni" required>
        <option value="">Giorni di lavoro</option>
        <option>Tutti i giorni di apertura</option>
        <option>Weekend (Venerdì + Sabato + Domenica)</option>
      </select>

      <!-- Upload CV -->
      <input type="file" name="CV" accept=".pdf,.doc,.docx" required>

      <button type="submit">Invia candidatura</button>
    </form>

    <div class="back">
      <a href="index.html">← Torna alla home</a>
    </div>
  </div>

</body>
</html>
