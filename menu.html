<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu - Pizzeria Renato</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Roboto',sans-serif;
  background:#111;
  color:white;
}
nav {
  position:fixed;
  top:0;
  width:100%;
  text-align:center;
  padding:15px 0;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  z-index:1000;
}
nav h1 { margin:0; font-size:2rem; }

.menu {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  padding:120px 20px 20px 20px;
  justify-items:center;
}

.card {
  background:#1a1a1a;
  border-radius:15px;
  border:2px solid #333;
  width:280px;
  min-height:220px;
  padding:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
  transition:0.3s;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.card:hover {
  transform:translateY(-8px) scale(1.02);
  border-color:#ff4d4d;
}

.card h3 {
  margin:0 0 10px 0;
  font-size:1.3rem;
}

.card p { margin:5px 0; }

.badges {
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin-bottom:10px;
}

.badge {
  padding:3px 8px;
  border-radius:10px;
  font-size:0.8rem;
  font-weight:bold;
}

.tipo {
  background:#ff4d4d;
}

.allergene {
  background:#28a745;
}

footer {
  text-align:center;
  padding:30px;
  opacity:0.7;
}
</style>
</head>
<body>

<nav><h1>Menu Pizzeria Renato</h1></nav>

<section class="menu" id="menu"></section>

<footer>© 2026 Pizzeria Renato</footer>

<script>
// URL JSON raw GitHub
const url = "https://raw.githubusercontent.com/davideiacuzio005/NUOVAPIZZA/main/pizze.json";

async function caricaMenu() {
  try {
    const res = await fetch(url);
    const pizze = await res.json();
    const menu = document.getElementById("menu");
    menu.innerHTML = "";

    pizze.forEach(p => {
      const card = document.createElement("div");
      card.classList.add("card");

      // Badges tipo e allergeni
      let badgesHTML = '<div class="badges">';
      if(p.tipo) badgesHTML += `<span class="badge tipo">${p.tipo}</span>`;
      if(p.allergeni) p.allergeni.forEach(a=>{
        badgesHTML += `<span class="badge allergene">${a}</span>`;
      });
      badgesHTML += '</div>';

      // Card content
      card.innerHTML = `
        ${badgesHTML}
        <h3>${p.nome}</h3>
        <p>${p.ingredienti}</p>
        <p>€${p.prezzo}</p>
      `;

      menu.appendChild(card);
    });

  } catch(e) {
    document.getElementById("menu").innerHTML =
      "<p style='text-align:center;color:red;'>Errore nel caricare il menu. Controlla che <strong>pizze.json</strong> esista e sia pubblico.</p>";
    console.error(e);
  }
}

caricaMenu();
</script>
</body>
</html>
