<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menù – Pizzeria Renato</title>
<meta name="description" content="Scopri il menù della Pizzeria Renato: pizze classiche, piccanti e vegetariane con ingredienti freschi.">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
 
<style>
:root{
  --red:#c0392b;
  --red-dark:#96281b;
  --red-glow:rgba(192,57,43,0.35);
  --cream:#f5f0e8;
  --gold:#c9a84c;
  --dark:#0e0b08;
  --dark2:#1a1410;
  --dark3:#241e18;
  --text:#f0ebe0;
  --text-muted:#a09070;
  --border:rgba(201,168,76,0.2);
  --green:#2e7d32;
}
 
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--dark);color:var(--text);font-family:'Lato',sans-serif;overflow-x:hidden;}
 
/* GRAIN */
body::before{
  content:"";position:fixed;inset:0;z-index:9999;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:0.45;
}
 
/* ─── NAVBAR ─── */
nav{
  position:fixed;top:0;width:100%;z-index:1000;
  padding:0 40px;
  display:flex;justify-content:space-between;align-items:center;height:70px;
  background:rgba(14,11,8,0.88);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  transition:all 0.4s;
}
nav.scrolled{background:rgba(14,11,8,0.97);}
nav .logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
nav .logo img{height:40px;border-radius:50%;border:2px solid var(--gold);}
nav .logo-text{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--gold);letter-spacing:0.05em;}
 
nav ul{display:flex;gap:5px;list-style:none;}
nav a{
  color:var(--text-muted);text-decoration:none;
  padding:8px 16px;border-radius:6px;
  font-size:0.88rem;letter-spacing:0.08em;text-transform:uppercase;font-weight:700;
  transition:all 0.2s;
}
nav a:hover{color:var(--cream);background:rgba(255,255,255,0.06);}
nav a.active{color:var(--gold);}
 
.hamburger{
  display:none;flex-direction:column;justify-content:center;
  gap:6px;cursor:pointer;z-index:1100;
  padding:8px;background:transparent;border:none;
}
.hamburger span{width:24px;height:2px;background:var(--text);border-radius:2px;transition:0.3s;display:block;}
.hamburger.active span:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
.hamburger.active span:nth-child(2){opacity:0;width:0;}
.hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}
 
.menu-overlay{
  display:none;position:fixed;inset:0;z-index:998;background:rgba(0,0,0,0.55);
}
.menu-overlay.show{display:block;}
 
@media(max-width:768px){
  nav{padding:0 20px;}
  nav ul{
    position:fixed;top:0;right:-100%;
    height:100vh;width:72%;max-width:280px;
    background:var(--dark2);flex-direction:column;
    padding:80px 0 40px;
    transition:right 0.35s cubic-bezier(.77,0,.175,1);
    border-left:1px solid var(--border);
    gap:0;z-index:999;list-style:none;overflow-y:auto;
  }
  nav ul.show{right:0;}
  nav ul li{width:100%;}
  nav ul li a{
    display:block;width:100%;padding:16px 28px;
    font-size:1rem;letter-spacing:0.06em;
    border-radius:0;border-bottom:1px solid rgba(201,168,76,0.1);color:var(--text);
  }
  nav ul li:first-child a{border-top:1px solid rgba(201,168,76,0.1);}
  nav ul li a:hover,nav ul li a.active{background:rgba(201,168,76,0.1);color:var(--gold);}
  .hamburger{display:flex;}
}
 
/* ─── HERO ─── */
.page-hero{
  padding-top:70px;position:relative;
  height:300px;display:flex;align-items:flex-end;justify-content:center;overflow:hidden;
}
.page-hero-bg{
  position:absolute;inset:0;
  background:url('https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=1400&q=80') center 55%/cover no-repeat;
}
.page-hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom, rgba(14,11,8,0.4) 0%, rgba(14,11,8,0.93) 100%);
}
.page-hero-content{
  position:relative;z-index:2;text-align:center;padding:0 20px 44px;
  animation:fadeUp 0.8s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.page-eyebrow{font-size:0.72rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.page-hero h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3rem);color:var(--cream);}
.page-hero p{color:var(--text-muted);font-size:0.95rem;margin-top:8px;font-weight:300;}
 
/* ─── FILTERS ─── */
.filters-bar{
  display:flex;justify-content:center;align-items:center;
  gap:8px;flex-wrap:wrap;
  padding:32px 20px 10px;
}
.filters-bar button{
  background:transparent;
  border:1px solid var(--border);
  padding:9px 20px;color:var(--text-muted);
  border-radius:30px;cursor:pointer;
  transition:all 0.2s;
  font-family:'Lato',sans-serif;
  font-size:0.78rem;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;
}
.filters-bar button:hover{border-color:var(--gold);color:var(--cream);}
.filters-bar button.active{background:var(--red);color:#fff;border-color:var(--red);}
 
/* COUNT BADGE */
.count-label{
  text-align:center;padding:10px 20px 28px;
  font-size:0.78rem;color:var(--text-muted);letter-spacing:0.08em;
}
.count-label span{color:var(--gold);}
 
/* ─── GRID ─── */
.menu-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:20px;
  padding:0 40px 80px;
  max-width:1200px;margin:0 auto;
}
@media(max-width:768px){.menu-grid{padding:0 20px 60px;}}
 
/* ─── CARD ─── */
.card{
  background:var(--dark3);
  border:1px solid var(--border);
  border-radius:6px;
  padding:24px 22px;
  transition:all 0.3s;
  position:relative;
  overflow:hidden;
  animation:cardIn 0.45s ease both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.card::before{
  content:"";position:absolute;top:0;left:0;width:3px;height:100%;
  background:var(--border);transition:background 0.3s;
}
.card:hover{border-color:rgba(201,168,76,0.5);transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,0.35);}
.card:hover::before{background:var(--gold);}
.card.tipo-piccante::before{background:var(--red);}
.card.tipo-vegetariana::before{background:var(--green);}
 
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px;}
.card-name{font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--cream);line-height:1.2;}
.card-price{
  font-weight:700;color:var(--gold);font-size:1.1rem;
  white-space:nowrap;flex-shrink:0;
}
 
.badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:20px;font-size:0.68rem;font-weight:700;
  letter-spacing:0.08em;text-transform:uppercase;
}
.badge-normale{background:rgba(255,255,255,0.08);color:var(--text-muted);}
.badge-piccante{background:rgba(192,57,43,0.2);color:#e87070;border:1px solid rgba(192,57,43,0.3);}
.badge-vegetariana{background:rgba(46,125,50,0.2);color:#6dbf6d;border:1px solid rgba(46,125,50,0.3);}
 
.card-desc{color:var(--text-muted);font-size:0.88rem;line-height:1.6;margin-bottom:10px;font-weight:300;}
.card-allergeni{
  font-size:0.75rem;color:rgba(160,144,112,0.65);
  border-top:1px solid var(--border);padding-top:10px;margin-top:4px;
}
 
/* HIDDEN */
.card.hidden{display:none;}
 
/* EMPTY */
.empty-state{
  text-align:center;padding:60px 20px;
  grid-column:1/-1;color:var(--text-muted);
}
.empty-state .icon{font-size:2.5rem;margin-bottom:14px;}
.empty-state p{font-size:0.95rem;}
 
/* ─── FOOTER ─── */
footer{
  background:var(--dark);border-top:1px solid var(--border);
  padding:36px 40px;
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;
}
.footer-logo{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--gold);}
.footer-copy{color:var(--text-muted);font-size:0.82rem;}
@media(max-width:600px){footer{flex-direction:column;text-align:center;padding:28px 20px;}}
</style>
</head>
<body>
 
<div class="menu-overlay" id="menuOverlay"></div>
 
<!-- NAVBAR -->
<nav id="navbar">
  <a class="logo" href="index.html">
    <img src="https://raw.githubusercontent.com/davideiacuzio005-source/NUOVAPIZZA/main/Logo%20Pizzeria.jpg" alt="Logo">
    <span class="logo-text">Pizzeria Renato</span>
  </a>
  <ul id="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="menu.html" class="active">Menù</a></li>
    <li><a href="index.html#reservation">Prenotazione</a></li>
    <li><a href="lavora.html" target="_blank" rel="noopener">Lavora con noi</a></li>
    <li><a href="index.html#about">Chi siamo</a></li>
  </ul>
  <button class="hamburger" id="hamburger" aria-label="Apri menu">
    <span></span><span></span><span></span>
  </button>
</nav>
 
<!-- HERO -->
<div class="page-hero">
  <div class="page-hero-bg"></div>
  <div class="page-hero-overlay"></div>
  <div class="page-hero-content">
    <p class="page-eyebrow">Fatto con amore ogni giorno</p>
    <h1>Le nostre pizze</h1>
    <p>Impasto a lunga lievitazione · Forno a legna · Ingredienti freschi</p>
  </div>
</div>
 
<!-- FILTERS -->
<div class="filters-bar">
  <button class="active" data-type="all">🍕 Tutte</button>
  <button data-type="normale">Classiche</button>
  <button data-type="piccante">🌶 Piccanti</button>
  <button data-type="vegetariana">🥦 Vegetariane</button>
</div>
<div class="count-label" id="countLabel"></div>
 
<!-- GRID -->
<section class="menu-grid" id="menuGrid"></section>
 
<!-- FOOTER -->
<footer>
  <div class="footer-logo">Pizzeria Renato</div>
  <div class="footer-copy">© 2025 Pizzeria Renato · Tutti i diritti riservati</div>
</footer>
 
<script>
/* ===============================================================
   🍕 AGGIUNGI LE TUE PIZZE QUI
   Copia un blocco e modifica i valori.
   tipo: uno o più tra "normale", "piccante", "vegetariana"
================================================================ */
const pizze = [
 
  {
    nome: "Margherita",
    ingredienti: "Pomodoro San Marzano, fior di latte, basilico fresco, olio EVO",
    allergeni: "Glutine, latte",
    prezzo: "7.50",
    tipo: ["normale"]
  },
  {
    nome: "Diavola",
    ingredienti: "Pomodoro, mozzarella, salame piccante calabrese",
    allergeni: "Glutine, latte",
    prezzo: "9.50",
    tipo: ["normale","piccante"]
  },
  {
    nome: "Ortolana",
    ingredienti: "Mozzarella, zucchine grigliate, melanzane, peperoni, pomodorini",
    allergeni: "Glutine, latte",
    prezzo: "8.50",
    tipo: ["vegetariana"]
  },
  {
    nome: "Quattro Formaggi",
    ingredienti: "Mozzarella, gorgonzola, fontina, parmigiano reggiano",
    allergeni: "Glutine, latte",
    prezzo: "10.00",
    tipo: ["normale"]
  },
  {
    nome: "Inferno",
    ingredienti: "Pomodoro, mozzarella, 'nduja, cipolla rossa, peperoncino fresco",
    allergeni: "Glutine, latte",
    prezzo: "11.00",
    tipo: ["piccante"]
  },
  {
    nome: "Bufala e Rucola",
    ingredienti: "Pomodoro, mozzarella di bufala DOP, rucola fresca, scaglie di parmigiano",
    allergeni: "Glutine, latte",
    prezzo: "11.50",
    tipo: ["vegetariana"]
  }
 
];
 
/* ─── RENDER ─── */
const grid      = document.getElementById('menuGrid');
const countLabel= document.getElementById('countLabel');
 
const badgeIcon = { normale:'', piccante:'🌶', vegetariana:'🥦' };
const badgeLabel= { normale:'Classica', piccante:'Piccante', vegetariana:'Vegetariana' };
 
function renderPizze(filter){
  grid.innerHTML='';
  const filtered = filter==='all' ? pizze : pizze.filter(p=>p.tipo.includes(filter));
 
  if(filtered.length===0){
    grid.innerHTML=`
      <div class="empty-state">
        <div class="icon">🍕</div>
        <p>Nessuna pizza trovata per questa categoria.</p>
      </div>`;
    countLabel.innerHTML='';
    return;
  }
 
  countLabel.innerHTML=`<span>${filtered.length}</span> pizze${filtered.length!==1?'':''} disponibil${filtered.length!==1?'i':'e'}`;
 
  filtered.forEach((p,i)=>{
    const tipoClass = p.tipo.includes('piccante') ? 'tipo-piccante' : p.tipo.includes('vegetariana') ? 'tipo-vegetariana' : '';
    const badgesHtml = p.tipo.map(t=>
      `<span class="badge badge-${t}">${badgeIcon[t]?badgeIcon[t]+' ':''}${badgeLabel[t]}</span>`
    ).join('');
 
    const card = document.createElement('div');
    card.className = `card ${tipoClass}`;
    card.style.animationDelay = `${i*0.06}s`;
    card.dataset.tipo = p.tipo.join(' ');
    card.innerHTML=`
      <div class="card-top">
        <div class="card-name">${p.nome}</div>
        <div class="card-price">€${p.prezzo}</div>
      </div>
      <div class="badges">${badgesHtml}</div>
      <p class="card-desc">${p.ingredienti}</p>
      <p class="card-allergeni">⚠ Allergeni: ${p.allergeni}</p>
    `;
    grid.appendChild(card);
  });
}
 
renderPizze('all');
 
/* ─── FILTRI ─── */
document.querySelectorAll('.filters-bar button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filters-bar button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderPizze(btn.dataset.type);
  });
});
 
/* ─── NAVBAR ─── */
window.addEventListener('scroll',()=>{
  document.getElementById('navbar').classList.toggle('scrolled', window.scrollY>40);
});
 
/* ─── MOBILE MENU ─── */
const hamburger   = document.getElementById('hamburger');
const navLinks    = document.getElementById('nav-links');
const menuOverlay = document.getElementById('menuOverlay');
 
function openMenu(){
  hamburger.classList.add('active');navLinks.classList.add('show');
  menuOverlay.classList.add('show');document.body.style.overflow='hidden';
}
function closeMenu(){
  hamburger.classList.remove('active');navLinks.classList.remove('show');
  menuOverlay.classList.remove('show');document.body.style.overflow='';
}
hamburger.addEventListener('click',()=>navLinks.classList.contains('show')?closeMenu():openMenu());
menuOverlay.addEventListener('click',closeMenu);
document.querySelectorAll('#nav-links a').forEach(a=>a.addEventListener('click',closeMenu));
</script>
</body>
</html>
