<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizzeria Renato</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Roboto',sans-serif;}
body{background:#111;color:#fff;}

nav{position:sticky;top:0;width:100%;display:flex;justify-content:space-between;align-items:center;padding:1rem 2rem;z-index:999;}
nav ul{display:flex;gap:2rem;list-style:none;}
nav a{color:#fff;text-decoration:none;}
.logo img{height:50px;}

.hero{height:100vh;position:relative;}
.hero video{position:absolute;width:100%;height:100%;object-fit:cover;}
.hero .overlay{position:absolute;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(0,0,0,0.4);}
.hero h1{font-size:3rem;}
.cta a{background:#ff4d4d;padding:1rem 2rem;margin:5px;border-radius:5px;text-decoration:none;color:#fff;}

.menu{padding:2rem;text-align:center;}

.about{padding:3rem;text-align:center;background:#222;}

.reservation{padding:3rem;text-align:center;}
.reservation form{display:flex;flex-direction:column;gap:1rem;max-width:400px;margin:auto;}
input{padding:10px;background:#1a1a1a;border:none;color:white;}
button{padding:10px;background:#ff4d4d;color:white;border:none;cursor:pointer;}

#error{display:none;color:red;margin-top:1rem;}
#success-message{display:none;color:lightgreen;margin-top:1rem;}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
<div class="logo">
<img src="https://raw.githubusercontent.com/davideiacuzio005-source/NUOVAPIZZA/main/Logo%20Pizzeria.jpg">
</div>
<ul>
<li><a href="#hero">Home</a></li>
<li><a href="#menu">Menu</a></li>
<li><a href="#reservation">Prenota</a></li>
</ul>
</nav>

<!-- HERO -->
<section class="hero" id="hero">
<video src="pizza-video.mp4" autoplay muted loop></video>
<div class="overlay">
<h1>La Migliore Pizza in Città</h1>
<div class="cta">
<a href="#reservation">Prenota Ora</a>
<a href="#menu">Menu</a>
</div>
</div>
</section>

<!-- MENU -->
<section class="menu" id="menu">
<h2>Il nostro menu</h2>
<p>(qui rimane il tuo menu come prima)</p>
</section>

<!-- ABOUT -->
<section class="about">
<h2>Chi siamo</h2>
<p>Pizzeria artigianale con ingredienti freschi e di qualità.</p>
</section>

<!-- PRENOTAZIONE -->
<section class="reservation" id="reservation">
<h2>Prenota il tuo tavolo</h2>

<form id="reservation-form">
<input type="text" id="nome" placeholder="Nome" required>
<input type="email" id="email" placeholder="Email" required>
<input type="tel" id="telefono" placeholder="Telefono" required>
<input type="number" id="persone" placeholder="Numero persone" required>
<input type="date" id="data" required>
<input type="time" id="ora" required>
<button type="submit">Prenota Ora</button>
</form>

<div id="error"></div>
<div id="success-message">Prenotazione pronta! ✅</div>
</section>

<!-- SCRIPT -->
<script>
const form = document.getElementById("reservation-form");
const errorDiv = document.getElementById("error");
const successMessage = document.getElementById("success-message");

form.addEventListener("submit", function(e){
e.preventDefault();

const nome = document.getElementById("nome").value;
const email = document.getElementById("email").value;
const telefono = document.getElementById("telefono").value;
const persone = document.getElementById("persone").value;
const data = document.getElementById("data").value;
const ora = document.getElementById("ora").value;

// controlli
if(!nome || !email || !telefono || !persone || !data || !ora){
errorDiv.style.display="block";
errorDiv.innerText="Compila tutti i campi!";
return;
}

const d = new Date(data+"T"+ora);
const day = d.getDay();
const time = d.getHours() + d.getMinutes()/60;

if(day===2){
errorDiv.style.display="block";
errorDiv.innerText="Chiuso il martedì";
return;
}

if(!((time>=11 && time<=14.5)||(time>=18.5 && time<=23))){
errorDiv.style.display="block";
errorDiv.innerText="Orario non valido";
return;
}

// CREA EMAIL
const subject = "Nuova Prenotazione";
const body =
`Nome: ${nome}
Email: ${email}
Telefono: ${telefono}
Persone: ${persone}
Data: ${data}
Ora: ${ora}`;

const mailto = `mailto:davideiacuzio005@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

window.location.href = mailto;

successMessage.style.display="block";
errorDiv.style.display="none";
});
</script>

</body>
</html>
