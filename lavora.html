<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lavora con noi - Pizzeria Renato</title>
<meta name="description" content="Lavora con noi - Invia la tua candidatura a Pizzeria Renato e unisciti al nostro team.">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root {
  --red: #c0392b;
  --red-dark: #96281b;
  --red-glow: rgba(192,57,43,0.35);
  --cream: #f5f0e8;
  --gold: #c9a84c;
  --dark: #0e0b08;
  --dark2: #1a1410;
  --text: #f0ebe0;
  --text-muted: #a09070;
  --border: rgba(201,168,76,0.2);
  --transition: 0.4s ease;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { 
  background: var(--dark); 
  color: var(--text); 
  font-family:'Lato',sans-serif; 
  overflow-x:hidden; 
}

/* ───────── SFONDO NOISE ───────── */
body::before {
  content:""; position:fixed; inset:0; z-index:9999; pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:0.45;
}

/* ───────── CONTENITORE FORM ───────── */
.container {
  max-width:500px;
  margin:120px auto 80px;
  background:var(--dark2);
  padding:40px 36px 36px 36px;
  border-radius:8px;
  border:1px solid var(--border);
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
  transition: all var(--transition);
}
.container:hover { transform: translateY(-4px); }

/* ───────── TITOLO ───────── */
.container h1 {
  font-family:'Playfair Display',serif;
  color:var(--cream);
  font-size:2.6rem;
  text-align:center;
  margin-bottom:30px;
  position:relative;
}
.container h1::after {
  content:'';
  width:60px;
  height:2px;
  background:var(--gold);
  display:block;
  margin:10px auto 0;
  border-radius:2px;
}

/* ───────── FORM ───────── */
.form-group { position:relative; margin-bottom:22px; }
.form-group input,
.form-group select {
  width:100%;
  padding:14px 14px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:6px;
  color:var(--text);
  font-family:'Lato',sans-serif;
  font-size:0.95rem;
  outline:none;
  transition:border-color var(--transition), background var(--transition);
  appearance:none; /* per select */
}
.form-group input:focus,
.form-group select:focus {
  border-color:var(--gold);
  background:rgba(201,168,76,0.06);
}

/* ───────── FLOATING LABEL ───────── */
.form-group label {
  position:absolute;
  top:50%; left:14px;
  transform:translateY(-50%);
  color:var(--text-muted);
  font-size:0.75rem;
  font-weight:700;
  letter-spacing:0.1em;
  text-transform:uppercase;
  pointer-events:none;
  background:var(--dark2);
  padding:0 4px;
  transition:0.3s ease all;
}
.form-group input:focus + label,
.form-group input:not(:placeholder-shown) + label,
.form-group select:focus + label,
.form-group select option:checked + label {
  top:-10px; font-size:0.65rem; color:var(--gold);
}

/* ───────── PULSANTE ───────── */
.btn-submit {
  width:100%;
  padding:16px;
  background:var(--red);
  color:#fff;
  border:none;
  border-radius:6px;
  font-family:'Lato',sans-serif;
  font-size:0.9rem;
  font-weight:700;
  letter-spacing:0.12em;
  text-transform:uppercase;
  cursor:pointer;
  transition:all 0.25s;
  margin-top:12px;
}
.btn-submit:hover {
  background:var(--red-dark);
  transform:translateY(-2px) scale(1.02);
  box-shadow:0 8px 25px var(--red-glow);
}
.btn-submit:disabled { opacity:0.6; cursor:not-allowed; transform:none; }

/* ───────── MESSAGGI ERRORE ───────── */
.error-msg {
  color:var(--red);
  font-size:0.85rem;
  margin-top:14px;
  min-height:20px;
}

/* ───────── LINK TORNA INDIETRO ───────── */
.back { margin-top:24px; text-align:center; }
.back a {
  color:var(--gold);
  text-decoration:none;
  font-weight:700;
  transition:all 0.25s;
}
.back a:hover { text-decoration:underline; transform:scale(1.02); }

/* ───────── SCROLL REVEAL ───────── */
.reveal { opacity:0; transform:translateY(20px); transition:all 0.8s ease; }
.reveal.visible { opacity:1; transform:translateY(0); }
</style>
</head>
<body>

<div class="container reveal">
  <h1>Lavora con noi</h1>
  <form id="jobForm" enctype="multipart/form-data">
    <input type="hidden" name="_subject" value="RICHIESTA PERSONALE">

    <div class="form-group">
      <input type="text" id="nome" name="Nome" placeholder=" " required>
      <label for="nome">Nome e Cognome</label>
    </div>

    <div class="form-group">
      <input type="number" id="anno" name="Anno di nascita" placeholder=" " min="1950" max="2010" required>
      <label for="anno">Anno di nascita</label>
    </div>

    <div class="form-group">
      <select id="lavoro" name="Lavoro" required>
        <option value="" hidden>Seleziona</option>
        <option>Cameriere</option>
        <option>Cuoco</option>
        <option>Pizzaiolo</option>
      </select>
      <label for="lavoro">Tipo di lavoro</label>
    </div>

    <div class="form-group">
      <select id="orari" name="Orari" required>
        <option value="" hidden>Seleziona</option>
        <option>Mattina</option>
        <option>Sera</option>
        <option>Mattina e Sera</option>
      </select>
      <label for="orari">Orari preferiti</label>
    </div>

    <div class="form-group">
      <select id="giorni" name="Giorni" required>
        <option value="" hidden>Seleziona</option>
        <option>Tutti i giorni di apertura</option>
        <option>Weekend (Venerdì + Sabato + Domenica)</option>
      </select>
      <label for="giorni">Giorni di lavoro</label>
    </div>

    <div class="form-group">
      <input type="file" id="cv" name="CV" accept=".pdf" required>
      <label for="cv">Carica il tuo CV (PDF)</label>
    </div>

    <button type="submit" class="btn-submit">Invia candidatura</button>
    <p class="error-msg" id="errorMsg"></p>
  </form>

  <div class="back">
    <a href="index.html">← Torna alla home</a>
  </div>
</div>

<script>
// Scroll reveal
const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('visible'); });
},{threshold:0.12});
document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));

// Form submit
const form = document.getElementById('jobForm');
const errorEl = document.getElementById('errorMsg');

form.addEventListener('submit', async (e)=>{
  e.preventDefault();
  errorEl.textContent='';
  const btn = form.querySelector('.btn-submit');
  btn.textContent='Invio in corso…'; btn.disabled=true;

  try{
    const res = await fetch('https://formsubmit.co/ajax/davideiacuzio005@gmail.com',{
      method:'POST',
      body:new FormData(form),
      headers:{Accept:'application/json'}
    });
    if(res.ok){ window.location.href='graziecandidatura.html'; }
    else{ errorEl.textContent="Errore durante l'invio. Riprova!"; btn.textContent='Invia candidatura'; btn.disabled=false; }
  }catch(err){
    errorEl.textContent='Errore di rete. Riprova!'; btn.textContent='Invia candidatura'; btn.disabled=false;
  }
});
</script>

</body>
</html>
