<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grazie per la candidatura!</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --red: #c0392b;
  --red-dark: #96281b;
  --gold: #c9a84c;
  --dark: #0e0b08;
  --dark2: #1a1410;
  --text: #f0ebe0;
  --text-muted: #a09070;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Lato', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}
.container {
  max-width: 500px;
  background: var(--dark2);
  padding: 40px;
  border-radius: 8px;
  border: 1px solid rgba(201,168,76,0.25);
  text-align: center;
}
h1 {
  font-family: 'Playfair Display', serif;
  color: var(--gold);
  font-size: 2.8rem;
  margin-bottom: 20px;
}
p {
  color: var(--text-muted);
  font-size: 1rem;
  line-height: 1.6;
  margin-bottom: 30px;
}
.btn {
  display: inline-block;
  padding: 14px 36px;
  background: var(--red);
  color: #fff;
  border-radius: 4px;
  text-decoration: none;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  transition: all 0.25s;
}
.btn:hover {
  background: var(--red-dark);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(192,57,43,0.35);
}
</style>
</head>
<body>

<div class="container">
  <h1>Grazie!</h1>
  <p>La tua candidatura è stata inviata con successo.<br>
     Ti contatteremo al più presto se il tuo profilo corrisponde alle nostre esigenze.</p>
  <a href="index.html" class="btn">Torna alla Home</a>
</div>

</body>
</html>
