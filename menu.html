<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menu - Pizzeria Renato</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root{
  --red:#c0392b;
  --red-dark:#96281b;
  --gold:#c9a84c;
  --dark:#0e0b08;
  --dark2:#1a1410;
  --dark3:#241e18;
  --text:#f0ebe0;
  --text-muted:#a09070;
  --border:rgba(201,168,76,0.2);
}

*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'Lato',sans-serif;}

/* NAV */
nav{
position:fixed;top:0;width:100%;
display:flex;justify-content:space-between;align-items:center;
padding:0 30px;height:70px;
background:rgba(14,11,8,0.85);
backdrop-filter:blur(20px);
border-bottom:1px solid var(--border);
z-index:1000;
}
nav a{
color:var(--text-muted);
text-decoration:none;
margin:0 10px;
font-size:0.85rem;
letter-spacing:0.1em;
text-transform:uppercase;
font-weight:700;
}
nav a:hover{color:var(--gold);}

/* HERO */
.hero{
height:50vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:url('https://images.unsplash.com/photo-1513104890138-7c749659a591') center/cover;
position:relative;
}
.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.65);
}
.hero h1{
position:relative;
z-index:2;
font-family:'Playfair Display',serif;
font-size:3rem;
color:var(--text);
}

/* FILTRI */
.filters{
margin-top:90px;
display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
padding:20px;
}
.filters button{
background:transparent;
border:1px solid var(--border);
padding:10px 20px;
color:var(--text-muted);
border-radius:30px;
cursor:pointer;
transition:0.25s;
font-size:0.75rem;
letter-spacing:0.1em;
text-transform:uppercase;
}
.filters button:hover{
border-color:var(--gold);
color:var(--gold);
}
.filters button.active{
background:var(--red);
color:#fff;
border-color:var(--red);
}

/* MENU GRID */
.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
padding:40px;
}

/* CARD */
.card{
background:var(--dark3);
border:1px solid var(--border);
border-radius:6px;
overflow:hidden;
transition:0.3s;
position:relative;
opacity:0;
transform:translateY(20px);
animation:fadeUp 0.6s forwards;
}
.card:hover{
transform:translateY(-6px);
border-color:var(--gold);
}

/* IMG */
.card img{
width:100%;
height:200px;
object-fit:cover;
filter:brightness(0.9);
}

/* INFO */
.info{
padding:20px;
text-align:center;
}
.info h3{
font-family:'Playfair Display',serif;
margin-bottom:8px;
}
.info p{
color:var(--text-muted);
font-size:0.9rem;
margin-bottom:8px;
}
.price{
color:var(--gold);
font-weight:700;
}

/* BADGE */
.badge{
position:absolute;
top:12px;
left:12px;
padding:4px 10px;
border-radius:20px;
font-size:0.7rem;
font-weight:700;
text-transform:uppercase;
}
.normale{background:#555;}
.piccante{background:#c0392b;}
.vegetariana{background:#2e7d32;}

/* FOOTER */
footer{
text-align:center;
padding:30px;
color:var(--text-muted);
font-size:0.8rem;
}

/* ANIMAZIONE */
@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<nav>
  <div>Pizzeria Renato</div>
  <div>
    <a href="index.html">Home</a>
    <a href="menu.html">Menu</a>
  </div>
</nav>

<section class="hero">
  <h1>Le Nostre Pizze</h1>
</section>

<div class="filters">
  <button class="active" data-type="all">Tutto</button>
  <button data-type="normale">Classiche</button>
  <button data-type="piccante">Piccanti</button>
  <button data-type="vegetariana">Vegetariane</button>
</div>

<section class="menu" id="menu"></section>

<footer>
  © 2026 Pizzeria Renato
</footer>

<script>
let pizze = JSON.parse(localStorage.getItem("pizze")) || [];

const menu = document.getElementById("menu");

function mostraMenu(){
  menu.innerHTML = "";

  pizze.forEach((pizza, index) => {

    let badge = pizza.tipo.map(t =>
      `<span class="badge ${t}">${t}</span>`
    ).join("");

    let div = document.createElement("div");
    div.classList.add("card");
    div.dataset.type = pizza.tipo.join(" ");

    div.style.animationDelay = (index * 0.1) + "s";

    div.innerHTML = `
      ${badge}
      <img src="${pizza.immagine}">
      <div class="info">
        <h3>${pizza.nome}</h3>
        <p>${pizza.ingredienti}</p>
        <p class="price">€${pizza.prezzo}</p>
      </div>
    `;

    menu.appendChild(div);
  });
}

mostraMenu();

const buttons = document.querySelectorAll('.filters button');

buttons.forEach(btn=>{
  btn.addEventListener('click',()=>{

    buttons.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');

    const type = btn.dataset.type;
    const cards = document.querySelectorAll('.card');

    cards.forEach(card=>{
      if(type==='all' || card.dataset.type.includes(type)){
        card.style.display="block";
      } else {
        card.style.display="none";
      }
    });
  });
});
</script>

</body>
</html>
