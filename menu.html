<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu - Pizzeria Renato</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Roboto',sans-serif;
  background:#111;
  color:white;
}
nav {
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  padding:15px 0;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  z-index:1000;
}
nav h1 {
  color:white;
  margin:0;
  font-size:2rem;
}
.menu {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
  padding:120px 30px 30px 30px;
}
.card {
  background:#1a1a1a;
  border-radius:15px;
  overflow:hidden;
  position:relative;
  border:2px solid #333;
  transition:0.3s;
}
.card:hover {
  transform:translateY(-10px) scale(1.03);
  border-color:#ff4d4d;
}
.card img {
  width:100%;
  height:200px;
  object-fit:cover;
}
.card .info {
  padding:15px;
  text-align:center;
}
.card .info h3 { margin-bottom:5px; }
.card .price { color:#ff4d4d; font-weight:bold; }
.badge {
  position:absolute;
  top:10px;
  left:10px;
  padding:5px 10px;
  border-radius:20px;
  font-size:0.8rem;
  font-weight:bold;
}
.normale { background:#6c757d; }
.piccante { background:#e60000; }
.vegetariana { background:#28a745; }
footer {
  text-align:center;
  padding:30px;
  opacity:0.7;
}
</style>
</head>
<body>

<nav><h1>Menu Pizzeria Renato</h1></nav>

<section class="menu" id="menu"></section>

<footer>© 2026 Pizzeria Renato</footer>

<script>
// URL JSON raw GitHub
const url = "https://raw.githubusercontent.com/davideiacuzio005/NUOVAPIZZA/main/pizze.json";

async function caricaMenu() {
  try {
    const res = await fetch(url);
    const pizze = await res.json();
    const menu = document.getElementById("menu");
    menu.innerHTML = "";

    pizze.forEach(p => {
      const card = document.createElement("div");
      card.classList.add("card");

      let badges = p.tipo.map(t => `<span class="badge ${t}">${t}</span>`).join("");

      card.innerHTML = `
        ${badges}
        <img src="${p.immagine}" alt="${p.nome}">
        <div class="info">
          <h3>${p.nome}</h3>
          <p>${p.ingredienti}</p>
          <p class="price">€${p.prezzo}</p>
        </div>
      `;

      menu.appendChild(card);
    });

  } catch(e) {
    document.getElementById("menu").innerHTML = "<p style='text-align:center;color:red;'>Errore nel caricare il menu. Controlla che <strong>pizze.json</strong> esista e sia pubblico.</p>";
    console.error(e);
  }
}

// Carica il menu subito
caricaMenu();
</script>

</body>
</html>
