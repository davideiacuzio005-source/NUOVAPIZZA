<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menu - Pizzeria Renato</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Roboto',sans-serif;}
body{background:#111;color:white;}

/* NAVBAR */
nav{
position:fixed;top:0;width:100%;
display:flex;justify-content:space-between;align-items:center;
padding:15px 20px;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);
z-index:1000;
}
nav a{color:white;text-decoration:none;margin:0 10px;}
nav a:hover{color:#ff4d4d;}

/* HERO */
.hero{
height:50vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:url('https://images.unsplash.com/photo-1513104890138-7c749659a591') center/cover;
position:relative;
}
.hero::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}
.hero h1{
position:relative;
z-index:2;
font-size:3rem;
}

/* FILTRI */
.filters{
margin-top:80px;
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
padding:20px;
}
.filters button{
background:#222;
border:none;
padding:10px 20px;
color:white;
border-radius:20px;
cursor:pointer;
transition:0.3s;
}
.filters button.active,
.filters button:hover{
background:#ff4d4d;
}

/* MENU GRID */
.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:30px;
}

/* CARD */
.card{
background:#1a1a1a;
border-radius:15px;
overflow:hidden;
transition:0.3s;
position:relative;
border:2px solid #333;
}
.card:hover{
transform:translateY(-10px) scale(1.03);
border-color:#ff4d4d;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

/* INFO */
.info{
padding:15px;
text-align:center;
}
.info h3{margin-bottom:5px;}
.price{color:#ff4d4d;font-weight:bold;}

/* BADGE */
.badge{
position:absolute;
top:10px;
left:10px;
padding:5px 10px;
border-radius:20px;
font-size:0.8rem;
font-weight:bold;
}
.normale{background:#6c757d;}
.piccante{background:#e60000;}
.vegetariana{background:#28a745;}

/* FOOTER */
footer{
text-align:center;
padding:30px;
opacity:0.7;
}
</style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="menu.html">Menu</a>
</nav>

<section class="hero">
  <h1>Le Nostre Pizze</h1>
</section>

<div class="filters">
  <button class="active" data-type="all">Tutto</button>
  <button data-type="normale">Classiche</button>
  <button data-type="piccante">Piccanti</button>
  <button data-type="vegetariana">Vegetariane</button>
</div>

<section class="menu">

  <!--margherita-->
  <div class="card" data-type="normale">
    <span class="badge normale">Classica</span>
    <img src="https://images.unsplash.com/photo-1601924582975-7e4c0e9c2b9b">
    <div class="info">
      <h3>Margherita</h3>
      <p>Pomodoro e Mozzarella</p>
      <p class="price">€6.00</p>
    </div>
  </div>

  <!--diavola-->
  <div class="card" data-type="piccante">
    <span class="badge piccante">Piccante</span>
    <img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65">
    <div class="info">
      <h3>Diavola</h3>
      <p>Pomodoro, Mozzarella, Salame piccante, Peperoni e Olive</p>
      <p class="price">€8.00</p>
    </div>
  </div>

  <!--vegetariana-->
  <div class="card" data-type="vegetariana">
    <span class="badge vegetariana">Vegetariana</span>
    <img src="https://images.unsplash.com/photo-1548365328-9f547fb0953d">
    <div class="info">
      <h3>Vegetariana</h3>
      <p>Verdure grigliate, mozzarella</p>
      <p class="price">€7.50</p>
    </div>
  </div>

<!--FINE SEZIONE PIZZE-->
</section>

<footer>
  © 2026 Pizzeria Renato
</footer>

<script>
// FILTRI
const buttons = document.querySelectorAll('.filters button');
const cards = document.querySelectorAll('.card');

buttons.forEach(btn=>{
  btn.addEventListener('click',()=>{
    buttons.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');

    const type = btn.dataset.type;

    cards.forEach(card=>{
      if(type==='all' || card.dataset.type===type){
        card.style.display="block";
      } else {
        card.style.display="none";
      }
    });
  });
});
</script>

</body>
</html>
