<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lavora con noi - Pizzeria Renato</title>
<meta name="description" content="Lavora con noi - Invia la tua candidatura a Pizzeria Renato e unisciti al nostro team.">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root {
  --red: #c0392b;
  --red-dark: #96281b;
  --red-glow: rgba(192,57,43,0.35);
  --cream: #f5f0e8;
  --gold: #c9a84c;
  --dark: #0e0b08;
  --dark2: #1a1410;
  --dark3: #241e18;
  --text: #f0ebe0;
  --text-muted: #a09070;
  --border: rgba(201,168,76,0.2);
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--dark);color:var(--text);font-family:'Lato',sans-serif;overflow-x:hidden;}

body::before{
  content:"";position:fixed;inset:0;z-index:9999;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:0.45;
}

/* ─── FORM STILE ─── */
.container{max-width:500px;margin:120px auto 80px;background:var(--dark2);padding:36px;border-radius:6px;border:1px solid var(--border);}
.container h1{font-family:'Playfair Display',serif;color:var(--cream);font-size:2.4rem;text-align:center;margin-bottom:24px;}
.form-group{margin-bottom:18px;}
.form-group label{display:block;font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-muted);font-weight:700;margin-bottom:6px;}
.form-group input,
.form-group select{
  width:100%;padding:12px 14px;background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:var(--text);
  font-family:'Lato',sans-serif;font-size:0.95rem;transition:border-color 0.2s;outline:none;
}
.form-group input:focus,.form-group select:focus{border-color:var(--gold);background:rgba(201,168,76,0.06);}
input[type="file"]{padding:6px;}
.btn-submit{
  width:100%;padding:14px;background:var(--red);color:#fff;border:none;border-radius:4px;
  font-family:'Lato',sans-serif;font-size:0.85rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;
  cursor:pointer;transition:all 0.25s;margin-top:8px;
}
.btn-submit:hover{background:var(--red-dark);transform:translateY(-1px);box-shadow:0 6px 20px var(--red-glow);}
.btn-submit:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.error-msg{color:var(--red);font-size:0.85rem;margin-top:14px;min-height:20px;}
.back{margin-top:18px;text-align:center;}
.back a{color:var(--gold);text-decoration:none;font-weight:700;}
.back a:hover{text-decoration:underline;}
</style>
</head>
<body>

<div class="container reveal">
  <h1>Lavora con noi</h1>
  <form id="jobForm" enctype="multipart/form-data">
    <input type="hidden" name="_subject" value="RICHIESTA PERSONALE">

    <div class="form-group">
      <label for="nome">Nome e Cognome</label>
      <input type="text" id="nome" name="Nome" placeholder="Mario Rossi" required>
    </div>

    <div class="form-group">
      <label for="anno">Anno di nascita</label>
      <input type="number" id="anno" name="Anno di nascita" placeholder="1990" min="1950" max="2010" required>
    </div>

    <div class="form-group">
      <label for="lavoro">Tipo di lavoro</label>
      <select id="lavoro" name="Lavoro" required>
        <option value="" disabled selected>Seleziona</option>
        <option>Cameriere</option>
        <option>Cuoco</option>
        <option>Pizzaiolo</option>
      </select>
    </div>

    <div class="form-group">
      <label for="orari">Orari preferiti</label>
      <select id="orari" name="Orari" required>
        <option value="" disabled selected>Seleziona</option>
        <option>Mattina</option>
        <option>Sera</option>
        <option>Mattina e Sera</option>
      </select>
    </div>

    <div class="form-group">
      <label for="giorni">Giorni di lavoro</label>
      <select id="giorni" name="Giorni" required>
        <option value="" disabled selected>Seleziona</option>
        <option>Tutti i giorni di apertura</option>
        <option>Weekend (Venerdì + Sabato + Domenica)</option>
      </select>
    </div>

    <div class="form-group">
      <label for="cv">Carica il tuo CV (PDF)</label>
      <input type="file" id="cv" name="CV" accept=".pdf" required>
    </div>

    <button type="submit" class="btn-submit">Invia candidatura</button>
    <p class="error-msg" id="errorMsg"></p>
  </form>

  <div class="back">
    <a href="index.html">← Torna alla home</a>
  </div>
</div>

<script>
// Scroll reveal
const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('visible'); });
},{threshold:0.12});
document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));

// Form submit
const form = document.getElementById('jobForm');
const errorEl = document.getElementById('errorMsg');

form.addEventListener('submit', async (e)=>{
  e.preventDefault();
  errorEl.textContent='';
  const btn = form.querySelector('.btn-submit');
  btn.textContent='Invio in corso…'; btn.disabled=true;

  try{
    const res = await fetch('https://formsubmit.co/ajax/davideiacuzio005@gmail.com',{
      method:'POST',
      body:new FormData(form),
      headers:{Accept:'application/json'}
    });
    if(res.ok){ window.location.href='graziecandidatura.html'; }
    else{ errorEl.textContent="Errore durante l'invio. Riprova!"; btn.textContent='Invia candidatura'; btn.disabled=false; }
  }catch(err){
    errorEl.textContent='Errore di rete. Riprova!'; btn.textContent='Invia candidatura'; btn.disabled=false;
  }
});
</script>

</body>
</html>
