<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pizzeria Renato</title>

<meta name="description" content="Pizzeria Renato - Pizza artigianale, ingredienti freschi e prenotazioni online.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Roboto',sans-serif;}
html{scroll-behavior:smooth;}
body{background:#0d0d0d;color:#fff;}

/* NAV */
nav{
position:fixed;top:0;width:100%;
display:flex;justify-content:space-between;align-items:center;
padding:15px 20px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(12px);
z-index:1000;
}
nav ul{display:flex;gap:20px;list-style:none;}
nav a{color:#fff;text-decoration:none;padding:8px 12px;border-radius:8px;}
nav a:hover{background:#ff4d4d;}

.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;}
.hamburger div{width:25px;height:3px;background:#fff;}

@media(max-width:768px){
nav ul{position:fixed;right:-100%;top:0;height:100vh;width:70%;background:#111;flex-direction:column;padding:80px 20px;transition:0.3s;}
nav ul.show{right:0;}
.hamburger{display:flex;}
}

/* HERO */
.hero{
height:100vh;
background:url('https://images.unsplash.com/photo-1601924582975-7e4c0e9c2b9b') center/cover;
display:flex;justify-content:center;align-items:center;text-align:center;
}
.hero h1{font-size:3rem;animation:fadeUp 1s ease;}
.cta{margin-top:20px;}
.cta a{
background:#ff4d4d;padding:12px 20px;margin:5px;
border-radius:6px;text-decoration:none;color:#fff;
transition:0.3s;
}
.cta a:hover{transform:scale(1.05);}

@keyframes fadeUp{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

/* MENU */
.menu{padding:80px 20px;}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}
.card{
background:#1a1a1a;border-radius:12px;
overflow:hidden;
transition:0.3s;
}
.card:hover{transform:translateY(-10px);}
.card img{width:100%;}
.card h3{padding:10px;}

/* REVIEWS */
.reviews{padding:60px 20px;background:#111;text-align:center;}
.review{margin:20px auto;max-width:500px;font-style:italic;}

/* ORARI */
.hours{padding:60px 20px;text-align:center;}
.hours p{margin:5px 0;}

/* MAPPA */
.map{padding:60px 20px;text-align:center;}
.map iframe{width:100%;max-width:600px;height:300px;border:0;border-radius:10px;}

/* FORM */
.reservation{padding:60px 20px;text-align:center;}
form{display:flex;flex-direction:column;gap:10px;max-width:400px;margin:auto;}
input,button{
padding:10px;border:none;border-radius:5px;
}
input{background:#1a1a1a;color:#fff;}
button{background:#ff4d4d;color:#fff;cursor:pointer;}
button:hover{background:#e60000;}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:#fff;
padding:15px;
border-radius:50%;
font-size:20px;
text-decoration:none;
}
</style>
</head>

<body>

<nav>
  <h2>🍕 Renato</h2>
  <ul id="nav-links">
    <li><a href="#hero">Home</a></li>
    <li><a href="#menu">Menu</a></li>
    <li><a href="#reservation">Prenota</a></li>
  </ul>
  <div class="hamburger" id="hamburger"><div></div><div></div><div></div></div>
</nav>

<section class="hero" id="hero">
  <div>
    <h1>Pizza Artigianale 🔥</h1>
    <div class="cta">
      <a href="#reservation">Prenota</a>
      <a href="#menu">Menu</a>
    </div>
  </div>
</section>

<section class="menu" id="menu">
  <h2 style="text-align:center;margin-bottom:20px;">Menu</h2>
  <div class="grid">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1601924582975-7e4c0e9c2b9b">
      <h3>Margherita</h3>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1601924582975-7e4c0e9c2b9b">
      <h3>Diavola</h3>
    </div>
  </div>
</section>

<section class="reviews">
  <h2>Recensioni ⭐</h2>
  <p class="review">"La migliore pizza della zona!"</p>
  <p class="review">"Impasto leggerissimo e ingredienti top."</p>
</section>

<section class="hours">
  <h2>Orari 🕒</h2>
  <p>Lun-Dom: 18:00 - 23:30</p>
</section>

<section class="map">
  <h2>Dove siamo 📍</h2>
  <iframe src="https://maps.google.com/maps?q=milano&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
</section>

<section class="reservation" id="reservation">
  <h2>Prenota</h2>
  <form action="https://formsubmit.co/davideiacuzio005@gmail.com" method="POST">
    <input type="text" name="Nome" placeholder="Nome" required>
    <input type="email" name="Email" placeholder="Email" required>
    <button type="submit">Invia</button>
  </form>
</section>

<a href="https://wa.me/391234567890" class="whatsapp">💬</a>

<script>
const hamburger=document.getElementById('hamburger');
const navLinks=document.getElementById('nav-links');

hamburger.addEventListener('click',()=>{
navLinks.classList.toggle('show');
});

document.querySelectorAll('a').forEach(link=>{
link.addEventListener('click',()=>{
navLinks.classList.remove('show');
});
});
</script>

</body>
</html>
