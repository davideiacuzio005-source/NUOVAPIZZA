<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lavora con noi</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root {
  --red: #c0392b;
  --red-dark: #96281b;
  --gold: #c9a84c;
  --dark: #0e0b08;
  --dark2: #1a1410;
  --dark3: #241e18;
  --text: #f0ebe0;
  --text-muted: #a09070;
  --border: rgba(201,168,76,0.2);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--dark);
  color:var(--text);
  font-family:'Lato',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

/* effetto noise */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:0.4;
  pointer-events:none;
}

/* CARD */
.container{
  background:rgba(26,20,16,0.9);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:6px;
  padding:40px;
  width:100%;
  max-width:500px;
  animation:fadeUp 0.8s ease;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

/* TITOLI */
h1{
  font-family:'Playfair Display',serif;
  font-size:2rem;
  text-align:center;
  margin-bottom:10px;
}

.subtitle{
  text-align:center;
  font-size:0.8rem;
  letter-spacing:0.25em;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:25px;
}

/* FORM */
form{
  display:flex;
  flex-direction:column;
  gap:18px;
}

label{
  font-size:0.7rem;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--text-muted);
  font-weight:700;
  margin-bottom:5px;
}

/* INPUT + SELECT FIXATI */
input, select{
  width:100%;
  padding:13px 14px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:4px;
  color:var(--text);
  font-size:0.95rem;
  transition:0.2s;
  appearance:none;
}

input:focus, select:focus{
  border-color:var(--gold);
  background:rgba(201,168,76,0.05);
  outline:none;
}

/* FIX DROPDOWN */
select{
  cursor:pointer;
}

select option{
  background:#1a1410;
  color:#f0ebe0;
}

/* FILE */
.file-box{
  border:1px dashed var(--border);
  padding:15px;
  border-radius:4px;
  text-align:center;
  color:var(--text-muted);
}

/* BUTTON */
button{
  margin-top:10px;
  padding:15px;
  background:var(--red);
  color:#fff;
  border:none;
  border-radius:4px;
  font-size:0.8rem;
  letter-spacing:0.12em;
  text-transform:uppercase;
  font-weight:700;
  cursor:pointer;
  transition:0.25s;
}

button:hover{
  background:var(--red-dark);
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(192,57,43,0.35);
}

/* BACK */
.back{
  text-align:center;
  margin-top:20px;
}

.back a{
  color:var(--gold);
  text-decoration:none;
  font-size:0.8rem;
}

/* ANIMAZIONE */
@keyframes fadeUp{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">

  <p class="subtitle">Unisciti al team</p>
  <h1>Lavora con noi</h1>

  <form action="https://formsubmit.co/davideiacuzio005@gmail.com" method="POST" enctype="multipart/form-data">

    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_subject" value="Nuova candidatura">

    <div>
      <label>Nome e Cognome</label>
      <input type="text" name="Nome" required>
    </div>

    <div>
      <label>Anno di nascita</label>
      <input type="number" name="Anno di nascita" min="1950" max="2010" required>
    </div>

    <div>
      <label>Ruolo</label>
      <select name="Lavoro" required>
        <option value="">Seleziona</option>
        <option>Cameriere</option>
        <option>Cuoco</option>
        <option>Pizzaiolo</option>
      </select>
    </div>

    <div>
      <label>Disponibilità oraria</label>
      <select name="Orari" required>
        <option value="">Seleziona</option>
        <option>Mattina</option>
        <option>Sera</option>
        <option>Mattina e Sera</option>
      </select>
    </div>

    <div>
      <label>Giorni disponibili</label>
      <select name="Giorni" required>
        <option value="">Seleziona</option>
        <option>Tutti i giorni di apertura</option>
        <option>Weekend</option>
      </select>
    </div>

    <div class="file-box">
      <label>Carica il tuo CV (PDF)</label><br><br>
      <input type="file" name="CV" accept=".pdf" required>
    </div>

    <button type="submit">Invia candidatura</button>

  </form>

  <div class="back">
    <a href="index.html">← Torna alla home</a>
  </div>

</div>

</body>
</html>
