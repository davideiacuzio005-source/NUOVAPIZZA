<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizzeria Renato</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
  body { overflow-x: hidden; background: #111; color: #fff; }

  nav { position: sticky; top: 0; width: 100%; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; z-index: 999; background: rgba(20,20,20,0.95);}
  nav .logo img { height: 40px; transition: transform 0.3s; }
  nav .logo img:hover { transform: scale(1.1); }
  nav ul { display: flex; gap: 1.5rem; list-style: none; }
  nav ul li a { color: #fff; text-decoration: none; padding: 0.5rem 1rem; border-radius: 8px; transition: background 0.3s, transform 0.2s; }
  nav ul li a:hover, nav ul li a.active { background: #ff4d4d; transform: translateY(-2px); }
  .hamburger { display: none; flex-direction: column; cursor: pointer; gap: 5px; }
  .hamburger div { width: 25px; height: 3px; background: #fff; transition: 0.3s; }
  .hamburger.active div:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
  .hamburger.active div:nth-child(2) { opacity: 0; }
  .hamburger.active div:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }

  @media(max-width:768px){
    nav ul { position: fixed; top:0; right:-100%; width:60%; height:100vh; flex-direction: column; gap:2rem; background:#222; padding:5rem 2rem; transition:right 0.3s ease; }
    nav ul.show { right:0; }
    .hamburger { display:flex; }
  }

  .hero { position: relative; width: 100%; height: 100vh; overflow: hidden; }
  .hero .overlay { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:0 1rem; }
  .hero h1 { font-size:3rem; }
  @media(max-width:768px){ .hero h1 { font-size:2rem; } }

  .reservation { padding:5rem 2rem; background:#111; display:flex; flex-direction:column; align-items:center; gap:2rem; }
  .reservation form { display:flex; flex-direction:column; gap:1rem; width:100%; max-width:400px; }
  .reservation input, .reservation select, .reservation textarea { padding:0.8rem; border-radius:5px; border:1px solid #333; background:#1a1a1a; color:#fff; }
  .reservation button { padding:1rem; border:none; background:#ff4d4d; color:#fff; border-radius:5px; cursor:pointer; transition: background 0.3s; }
  .reservation button:hover { background:#e60000; }
</style>
</head>
<body>

<nav>
  <div class="logo"><img src="https://raw.githubusercontent.com/davideiacuzio005-source/NUOVAPIZZA/main/Logo%20Pizzeria.jpg" alt="Logo Pizzeria"></div>
  <ul id="nav-links">
    <li><a href="#hero" class="active">Home</a></li>
    <li><a href="#reservation">Prenotazione</a></li>
  </ul>
  <div class="hamburger" id="hamburger"><div></div><div></div><div></div></div>
</nav>

<section class="hero" id="hero">
  <div class="overlay">
    <h1>La Migliore Pizza in Città</h1>
  </div>
</section>

<section class="reservation" id="reservation">
  <h2>Prenota il Tuo Tavolo</h2>
  <form id="reservation-form">
    <input type="text" id="nome" placeholder="Nome" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="tel" id="telefono" placeholder="Telefono" required>
    <input type="number" id="persone" placeholder="Numero persone" required>
    <input type="date" id="data" required>
    <input type="time" id="ora" required>
    <button type="submit">Prenota Ora</button>
  </form>
  <div id="error" style="display:none;color:red;margin-top:1rem;"></div>
  <p id="success-message" style="display:none;color:lightgreen;margin-top:1rem;">Prenotazione inviata! ✅</p>
</section>

<script>
const form = document.getElementById("reservation-form");
const successMessage = document.getElementById("success-message");
const errorDiv = document.getElementById("error");

// URL della tua Web App
const scriptURL = "https://script.google.com/macros/s/AKfycbwvJcA8T9w24asM-AidAHmpo_A3I0ZFyHjBipLicVbpbZUGdbgGdjehbTF-IuFrFZVaAg/exec";

form.addEventListener("submit", e => {
  e.preventDefault();
  const nome = document.getElementById("nome").value;
  const email = document.getElementById("email").value;
  const telefono = document.getElementById("telefono").value;
  const persone = document.getElementById("persone").value;
  const data = document.getElementById("data").value;
  const ora = document.getElementById("ora").value;

  if(!nome || !email || !telefono || !persone || !data || !ora){
    errorDiv.style.display = "block";
    errorDiv.textContent = "Compila tutti i campi!";
    successMessage.style.display = "none";
    return;
  }

  const formData = new FormData();
  formData.append("nome", nome);
  formData.append("email", email);
  formData.append("telefono", telefono);
  formData.append("persone", persone);
  formData.append("data", data);
  formData.append("ora", ora);

  fetch(scriptURL, { method: "POST", body: formData })
  .then(response => response.json())
  .then(result => {
    if(result.result === "success"){
      successMessage.style.display = "block";
      form.reset();
      setTimeout(()=>successMessage.style.display="none",3000);
    } else {
      throw new Error(result.message || "Errore sconosciuto");
    }
  })
  .catch(err=>{
    console.error(err);
    errorDiv.style.display="block";
    errorDiv.textContent="Errore nell'invio. Riprova.";
  });
});

// Hamburger menu
const hamburger = document.getElementById("hamburger");
const navLinks = document.getElementById("nav-links");
hamburger.addEventListener("click", ()=>{
  hamburger.classList.toggle("active");
  navLinks.classList.toggle("show");
});
</script>

</body>
</html>
