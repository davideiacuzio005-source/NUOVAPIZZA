<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Pizzeria Renato</title>
<style>
body{font-family:Arial;background:#111;color:white;text-align:center;padding:20px;}
input,button,textarea,select{padding:10px;margin:5px;border-radius:10px;border:none;width:300px;max-width:90%;}
button{background:#ff4d4d;color:white;cursor:pointer;}
textarea{height:60px;}
label{margin-right:10px;}
#jsonOutput{width:90%;height:200px;margin-top:20px;}
</style>
</head>
<body>

<h1>Admin - Pizzeria Renato</h1>

<!-- LOGIN -->
<div id="login">
  <input type="password" id="password" placeholder="Inserisci password">
  <button onclick="login()">Login</button>
</div>

<!-- PANNELLO -->
<div id="adminPanel" style="display:none;">
  <h2>Aggiungi nuova pizza</h2>

  <input id="nome" placeholder="Nome pizza"><br>
  <textarea id="ingredienti" placeholder="Ingredienti (separati da virgola)"></textarea><br>
  <input id="prezzo" placeholder="Prezzo"><br>

  <p>Tipo:</p>
  <select id="tipo">
    <option value="Classica">Classica</option>
    <option value="Piccante">Piccante</option>
    <option value="Vegetariana">Vegetariana</option>
  </select>

  <p>Allergeni (seleziona tutti quelli applicabili):</p>
  <label><input type="checkbox" value="Glutine"> Glutine</label>
  <label><input type="checkbox" value="Lattosio"> Lattosio</label>
  <label><input type="checkbox" value="Frutta secca"> Frutta secca</label>
  <label><input type="checkbox" value="Uova"> Uova</label>

  <br><br>
  <button onclick="aggiungiPizza()">➕ Aggiungi</button>

  <h2>Anteprima JSON</h2>
  <textarea id="jsonOutput"></textarea>

  <p style="color:#ff4d4d;">❗ Copia tutto il testo sopra in <strong>pizze.json</strong> su GitHub per aggiornare il menu</p>
</div>

<script>
const PASSWORD = "1234"; // cambia a piacere
let pizze = [];

function login(){
  if(document.getElementById("password").value === PASSWORD){
    document.getElementById("login").style.display="none";
    document.getElementById("adminPanel").style.display="block";
    aggiornaJSON();
  } else alert("Password sbagliata");
}

function aggiungiPizza(){
  let tipo = document.getElementById("tipo").value;
  let allergeni = [];
  document.querySelectorAll("input[type=checkbox]:checked").forEach(c=>allergeni.push(c.value));

  pizze.push({
    nome: document.getElementById("nome").value,
    ingredienti: document.getElementById("ingredienti").value,
    prezzo: document.getElementById("prezzo").value,
    tipo: tipo,
    allergeni: allergeni
  });

  // reset campi
  document.getElementById("nome").value="";
  document.getElementById("ingredienti").value="";
  document.getElementById("prezzo").value="";
  document.querySelectorAll("input[type=checkbox]").forEach(c=>c.checked=false);

  aggiornaJSON();
}

function aggiornaJSON(){
  document.getElementById("jsonOutput").value = JSON.stringify(pizze,null,2);
}
</script>

</body>
</html>
