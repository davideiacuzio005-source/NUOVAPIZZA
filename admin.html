<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Pizzeria Renato</title>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center;padding:20px;}
input,button,textarea{padding:10px;margin:5px;border-radius:10px;border:none;width:300px;max-width:90%;}
button{background:#ff4d4d;color:white;cursor:pointer;}
textarea{height:200px;}
</style>
</head>
<body>

<h1>Admin - Pizzeria Renato</h1>

<!-- LOGIN -->
<div id="login">
  <input type="password" id="password" placeholder="Inserisci password">
  <button onclick="login()">Login</button>
</div>

<!-- PANNELLO -->
<div id="adminPanel" style="display:none;">

  <h2>Aggiungi nuova pizza</h2>

  <input id="nome" placeholder="Nome pizza"><br>
  <textarea id="ingredienti" placeholder="Ingredienti (separati da virgola)"></textarea><br>
  <input id="prezzo" placeholder="Prezzo"><br>
  <input type="file" id="file"><br>

  <p>Tipo:</p>
  <label><input type="checkbox" value="normale"> Classica</label>
  <label><input type="checkbox" value="piccante"> Piccante</label>
  <label><input type="checkbox" value="vegetariana"> Vegetariana</label>

  <br><br>
  <button onclick="aggiungiPizza()">➕ Aggiungi</button>

  <h2>Anteprima JSON</h2>
  <textarea id="jsonOutput"></textarea>

  <p style="color:#ff4d4d;">
    ❗ Copia tutto il testo sopra e incollalo dentro <strong>pizze.json</strong> su GitHub!
  </p>

</div>

<script>
const PASSWORD = "1234"; // cambia questa!

let pizze = [];

function login(){
  if(document.getElementById("password").value === PASSWORD){
    document.getElementById("login").style.display="none";
    document.getElementById("adminPanel").style.display="block";
    aggiornaJSON();
  } else alert("Password sbagliata");
}

function toBase64(file){
  return new Promise((res,rej)=>{
    let reader = new FileReader();
    reader.onload = ()=>res(reader.result);
    reader.onerror = err=>rej(err);
    reader.readAsDataURL(file);
  });
}

async function aggiungiPizza(){
  let file = document.getElementById("file").files[0];
  if(!file){ alert("Seleziona immagine"); return; }
  let img = await toBase64(file);

  let tipi = [];
  document.querySelectorAll("input[type=checkbox]:checked")
    .forEach(c=>tipi.push(c.value));

  pizze.push({
    nome: document.getElementById("nome").value,
    ingredienti: document.getElementById("ingredienti").value,
    prezzo: document.getElementById("prezzo").value,
    immagine: img,
    tipo: tipi
  });

  document.getElementById("nome").value="";
  document.getElementById("ingredienti").value="";
  document.getElementById("prezzo").value="";
  document.getElementById("file").value="";
  document.querySelectorAll("input[type=checkbox]").forEach(c=>c.checked=false);

  aggiornaJSON();
}

function aggiornaJSON(){
  document.getElementById("jsonOutput").value = JSON.stringify(pizze,null,2);
}
</script>

</body>
</html>
